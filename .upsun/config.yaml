# Upsun configuration for the Dispatch demo blog.
# A stateless Symfony app: articles live as committed markdown files, so no
# database or persistent storage is required.
applications:
  app:
    type: php:8.5
    build:
      flavor: none
    hooks:
      build: |
        set -e
        curl -sfS https://get.symfony.com/cloud/configurator | bash
        symfony-build

        # Compile the Tailwind stylesheet with the standalone CLI (no Node needed).
        # Best-effort: the committed public/build/app.css is used as a fallback
        # if the binary cannot be downloaded during the build.
        if curl -sfSL -o /tmp/tailwindcss https://github.com/tailwindlabs/tailwindcss/releases/download/v3.4.17/tailwindcss-linux-x64; then
          chmod +x /tmp/tailwindcss
          /tmp/tailwindcss -c tailwind.config.js -i assets/styles/app.css -o public/build/app.css --minify
        else
          echo "tailwindcss download failed; using committed public/build/app.css"
        fi

      deploy: |
        set -ex
        symfony-deploy

    web:
      locations:
        /:
          root: public
          passthru: /index.php
          expires: 5m

    runtime:
      extensions:
        - apcu
        - mbstring

    mounts:
      var/cache:
        source: tmp
      var/log:
        source: storage

    variables:
      php:
        opcache.preload: config/preload.php

routes:
  https://{default}/:
    type: upstream
    upstream: app:http
